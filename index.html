<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GSA — Controle de Obras</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f0f0;color:#111}

/* LOGIN */
#pg-login{min-height:100vh;background:linear-gradient(135deg,#7f1d1d,#b91c1c);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
#pg-login h1{color:#ffd700;font-size:28px;margin-bottom:6px}
#pg-login p{color:rgba(255,255,255,.7);margin-bottom:24px;font-size:14px}
.lg-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:320px}
.lg-box label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:4px;text-transform:uppercase}
.lg-box input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:14px}
.lg-box button{width:100%;padding:13px;background:#b91c1c;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
#lg-erro{color:#b91c1c;font-size:13px;text-align:center;margin-top:8px;min-height:18px}

/* APP */
#pg-app{display:none;min-height:100vh}
.topo{background:#b91c1c;padding:12px 14px;position:sticky;top:0;z-index:99}
.topo h1{color:#ffd700;font-size:15px;font-weight:700}
.topo-btns{display:flex;gap:6px;margin-top:8px;overflow-x:auto}
.topo-btns::-webkit-scrollbar{display:none}
.topo-btn{flex:none;padding:6px 12px;border:none;border-radius:7px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:12px;cursor:pointer}
.topo-btn.ativo{background:#fff;color:#b91c1c;font-weight:700}

.conteudo{padding:12px}

/* CARDS */
.card{background:#fff;border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card-topo{padding:11px 13px;border-left:4px solid #b91c1c;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.card-nome{font-size:14px;font-weight:700}
.card-sub{font-size:11px;color:#666;margin-top:2px}
.card-val{font-size:15px;font-weight:800;color:#15803d;text-align:right}
.card-body{display:none;border-top:1px solid #eee}

/* SEÇÕES */
.sec{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f7f7f7;border-bottom:1px solid #eee}
.sec span{font-size:11px;font-weight:700;color:#666;text-transform:uppercase}
.sec button{background:#b91c1c;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}

/* LINHAS */
.linha{padding:9px 12px;border-bottom:1px solid #eee;display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center}
.linha-desc{font-size:12px;font-weight:600}
.linha-info{font-size:10px;color:#888;margin-top:2px}
.linha-val{font-size:13px;font-weight:700;white-space:nowrap}
.linha-acoes{display:flex;gap:4px}
.btn-ed{background:#e3f2fd;border:none;border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;color:#1565c0}
.btn-del{background:#fce4ec;border:none;border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;color:#b71c1c}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tag.pago{background:#dcfce7;color:#15803d}
.tag.aberto{background:#fee2e2;color:#b91c1c}
.tag.vencer{background:#fef3c7;color:#d97706}
.total-linha{display:flex;justify-content:space-between;padding:8px 12px;font-size:12px;font-weight:700;background:#f7f7f7;border-top:1px solid #eee}
.vazio{padding:14px;text-align:center;color:#999;font-size:12px}

/* RESUMO */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.res-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.res-lbl{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.res-val{font-size:18px;font-weight:700}
.verde{color:#15803d}.verm{color:#b91c1c}.azul{color:#1e40af}.amar{color:#d97706}

/* BOTÃO NOVO */
.btn-novo{width:100%;padding:12px;background:#b91c1c;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-novo.roxo{background:#7c3aed}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.overlay.aberto{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px 18px 36px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;color:#b91c1c;margin-bottom:14px}
.modal label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:4px;text-transform:uppercase}
.modal input,.modal select,.modal textarea{width:100%;padding:11px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:11px;color:#111;background:#f8f8f8;font-family:Arial}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.btn-cancel{flex:1;padding:12px;border:1.5px solid #ddd;border-radius:8px;background:#f0f0f0;font-size:14px;font-weight:600;cursor:pointer}
.btn-ok{flex:2;padding:12px;border:none;border-radius:8px;background:#b91c1c;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.btn-ok.roxo{background:#7c3aed}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:9px 18px;border-radius:50px;font-size:13px;opacity:0;transition:.25s;z-index:400;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.badge-viewer{background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#0d47a1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pg-login">
  <h1>🏗️ GSA OBRAS</h1>
  <p>Controle Financeiro de Obras</p>
  <div class="lg-box">
    <label>Senha de acesso</label>
    <input id="inp-senha" type="password" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button onclick="fazerLogin()">ENTRAR</button>
    <div id="lg-erro"></div>
  </div>
</div>

<!-- APP -->
<div id="pg-app">
  <div class="topo">
    <h1>🏗️ GSA — Controle de Obras</h1>
    <div class="topo-btns">
      <button class="topo-btn ativo" onclick="setTab(0)">🏠 Obras</button>
      <button class="topo-btn" onclick="setTab(1)">👷 Prestadores</button>
      <button class="topo-btn" onclick="setTab(2)">📊 Resumo</button>
      <button class="topo-btn" onclick="sair()" style="margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)">Sair</button>
    </div>
  </div>
  <div class="conteudo" id="conteudo"></div>
</div>

<!-- Modais -->
<div class="overlay" id="modal-obra"><div class="modal">
  <h3>🏗️ Nova Obra</h3>
  <label>Nome da obra</label><input id="o-nome" type="text" placeholder="Ex: Obra O6 - Rodry">
  <label>Cliente</label><input id="o-cliente" type="text" placeholder="Ex: Rodrigo Silva">
  <label>Endereço (opcional)</label><input id="o-end" type="text" placeholder="Ex: Pontes e Lacerda - MT">
  <label>Orçamento total (R$)</label><input id="o-orc" type="number" placeholder="Ex: 250000" inputmode="decimal">
  <div class="modal-btns">
    <button class="btn-cancel" onclick="fechar('modal-obra')">Cancelar</button>
    <button class="btn-ok" onclick="salvarObra()">Salvar ✓</button>
  </div>
</div></div>

<div class="overlay" id="modal-mat"><div class="modal">
  <h3>📦 Lançar Material</h3>
  <label>Data</label><input id="m-data" type="date">
  <label>Descrição</label><input id="m-desc" type="text" placeholder="Ex: 50 sacos de cimento" autocomplete="off">
  <label>Fornecedor</label><input id="m-forn" type="text" placeholder="Ex: Rei do Cimento" autocomplete="off">
  <div class="g2">
    <div><label>Valor (R$)</label><input id="m-val" type="number" placeholder="0,00" inputmode="decimal"></div>
    <div><label>Status</label><select id="m-status"><option value="pago">✅ Pago</option><option value="aberto">🔴 Em aberto</option><option value="vencer">🟡 A vencer</option></select></div>
  </div>
  <div class="g2">
    <div><label>Vencimento</label><input id="m-venc" type="date"></div>
    <div><label>Forma Pagt.</label><select id="m-forma"><option>PIX</option><option>Boleto</option><option>Dinheiro</option><option>Cartão</option><option>A prazo</option></select></div>
  </div>
  <div class="modal-btns">
    <button class="btn-cancel" onclick="fechar('modal-mat')">Cancelar</button>
    <button class="btn-ok" onclick="salvarMat()">Lançar ✓</button>
  </div>
</div></div>

<div class="overlay" id="modal-pag"><div class="modal">
  <h3>👷 Lançar Pagamento</h3>
  <div id="pag-info" style="background:#f3e8ff;border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px;font-weight:700;color:#7c3aed"></div>
  <label>Descrição</label><input id="pag-desc" type="text" placeholder="Ex: Pagamento quinzena" autocomplete="off">
  <div class="g2">
    <div><label>Data</label><input id="pag-data" type="date"></div>
    <div><label>Valor (R$)</label><input id="pag-val" type="number" placeholder="0,00" inputmode="decimal"></div>
  </div>
  <div class="g2">
    <div><label>Forma Pagt.</label><select id="pag-forma"><option>PIX</option><option>Dinheiro</option><option>Transferência</option><option>Cheque</option></select></div>
    <div><label>Status</label><select id="pag-status"><option value="pago">✅ Pago</option><option value="aberto">🔴 A pagar</option><option value="vencer">🟡 A vencer</option></select></div>
  </div>
  <label>Obra</label><select id="pag-obra-sel"></select>
  <div class="modal-btns">
    <button class="btn-cancel" onclick="fechar('modal-pag')">Cancelar</button>
    <button class="btn-ok roxo" onclick="salvarPag()">Lançar ✓</button>
  </div>
</div></div>

<div class="overlay" id="modal-prest"><div class="modal">
  <h3>👷 Cadastrar Prestador</h3>
  <label>Nome</label><input id="pr-nome" type="text" placeholder="Ex: Serralheria Silva" autocomplete="off">
  <label>Tipo de serviço</label><input id="pr-tipo" type="text" placeholder="Ex: Serralheria, Elétrica..." autocomplete="off">
  <label>Telefone (opcional)</label><input id="pr-tel" type="tel" placeholder="(65) 99999-9999">
  <div class="modal-btns">
    <button class="btn-cancel" onclick="fechar('modal-prest')">Cancelar</button>
    <button class="btn-ok roxo" onclick="salvarPrest()">Cadastrar ✓</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
// ======================================================
// GSA OBRAS — NOVO (sistema simples e funcional)
// ======================================================
var ADMIN_SENHA = 'GSA2026';
var VIEWER_SENHA = 'obra062026';
var CHAVE = 'gsaobras_v1';
var TAB_ATUAL = 0;
var ROLE = 'viewer';
var DADOS = {obras:[], prestadores:[]};
var CTX = {obraIdx:-1, prestIdx:-1, matIdx:-1, pagIdx:-1};

// ===== LOGIN =====
function fazerLogin(){
  var s = document.getElementById('inp-senha').value.trim();
  if(s === ADMIN_SENHA){
    ROLE = 'admin';
    localStorage.setItem('gsaobras_sess','admin');
    mostrarApp();
  } else if(s === VIEWER_SENHA){
    ROLE = 'viewer';
    localStorage.setItem('gsaobras_sess','viewer');
    mostrarApp();
  } else {
    document.getElementById('lg-erro').textContent = 'Senha incorreta.';
    document.getElementById('inp-senha').value = '';
  }
}

function mostrarApp(){
  document.getElementById('pg-login').style.display = 'none';
  document.getElementById('pg-app').style.display = 'block';
  carregar();
  render();
}

function sair(){
  localStorage.removeItem('gsaobras_sess');
  document.getElementById('pg-login').style.display = 'flex';
  document.getElementById('pg-app').style.display = 'none';
  document.getElementById('inp-senha').value = '';
  ROLE = 'viewer';
}

function isAdmin(){ return ROLE === 'admin'; }

// ===== DADOS =====
function carregar(){
  try{ var s=localStorage.getItem(CHAVE); if(s) DADOS=JSON.parse(s); }catch(e){}
  if(!DADOS.obras) DADOS.obras=[];
  if(!DADOS.prestadores) DADOS.prestadores=[];
  if(!DADOS.obras.length) carregarExemplo();
}

function salvar(){
  try{ localStorage.setItem(CHAVE, JSON.stringify(DADOS)); }catch(e){}
}

function carregarExemplo(){
  DADOS.prestadores=[
    {id:1,nome:'GSA',tipo:'Mão de obra / Construtora',tel:'(65) 99632-1773'},
    {id:2,nome:'Serralheria Silva',tipo:'Serralheria / Estruturas metálicas',tel:''},
    {id:3,nome:'Manoel',tipo:'Mão de obra geral',tel:''},
    {id:4,nome:'Lucas / Eletrosantana',tipo:'Elétrica',tel:''},
  ];
  DADOS.obras=[{
    id:1,nome:'OBRA O6 — RODRY',cliente:'Rodrigo',end:'Pontes e Lacerda - MT',orc:237040.19,status:'andamento',
    materiais:[
      {id:1,data:'2026-01-26',desc:'CAÇAMBA REMOÇÃO ENTULHO',forn:'PAPA ENTULHO',val:400,status:'pago',venc:'',forma:'PIX'},
      {id:2,data:'2026-01-26',desc:'PEDRISCO 1/2 — 13,24 TN',forn:'PEDREIRA SERRANA',val:1456.40,status:'pago',venc:'',forma:'PIX'},
      {id:3,data:'2026-01-27',desc:'50 SACOS CIMENTO ITAÚ',forn:'REI DO CIMENTO',val:2650,status:'pago',venc:'',forma:'Dinheiro'},
      {id:4,data:'2026-02-23',desc:'MATERIAL COBERTURA / ESTRUTURAS',forn:'VANZIM',val:16500,status:'pago',venc:'',forma:'PIX'},
      {id:5,data:'2026-04-17',desc:'MATERIAL FORRO DE GESSO',forn:'MULTIFIX',val:11000,status:'pago',venc:'',forma:'PIX'},
      {id:6,data:'2026-05-15',desc:'COMPRA MATERIAL',forn:'MINAS FERRO',val:5800,status:'vencer',venc:'Parcelado 4x',forma:'Boleto'},
      {id:7,data:'2026-05-23',desc:'MATERIAL ELÉTRICO',forn:'ELETRICA BASSI',val:2400,status:'aberto',venc:'',forma:''},
      {id:8,data:'2026-06-17',desc:'PISOS E ARGAMASSA',forn:'RIBEIRO',val:4100,status:'aberto',venc:'',forma:''},
    ],
    pagamentos:[
      {id:1,prestId:1,desc:'Mão de obra',data:'2026-01-30',val:4000,forma:'PIX',status:'pago'},
      {id:2,prestId:1,desc:'Mão de obra',data:'2026-02-13',val:3400,forma:'PIX',status:'pago'},
      {id:3,prestId:1,desc:'Mão de obra',data:'2026-03-27',val:10000,forma:'PIX',status:'pago'},
      {id:4,prestId:1,desc:'Mão de obra',data:'2026-04-24',val:6700,forma:'PIX',status:'pago'},
      {id:5,prestId:1,desc:'Mão de obra',data:'2026-05-08',val:7000,forma:'PIX',status:'pago'},
      {id:6,prestId:1,desc:'Mão de obra',data:'2026-06-19',val:7200,forma:'PIX',status:'pago'},
      {id:7,prestId:2,desc:'Serralheria',data:'2026-03-12',val:12000,forma:'PIX',status:'pago'},
      {id:8,prestId:2,desc:'Serralheria',data:'2026-04-30',val:5000,forma:'PIX',status:'pago'},
      {id:9,prestId:2,desc:'Serralheria',data:'2026-04-30',val:4000,forma:'PIX',status:'pago'},
      {id:10,prestId:3,desc:'Mão de obra geral',data:'2026-04-13',val:450,forma:'PIX',status:'pago'},
      {id:11,prestId:4,desc:'Instalação elétrica',data:'2026-06-12',val:5000,forma:'PIX',status:'pago'},
    ]
  }];
  salvar();
}

// ===== UTILS =====
function fmt(v){ return(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtD(s){ if(!s)return'—'; var p=s.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s; }
function hoje(){ return new Date().toISOString().split('T')[0]; }
function gid(){ return Date.now()+Math.floor(Math.random()*9999); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500); }
function fechar(id){ document.getElementById(id).classList.remove('aberto'); }

function calcObra(o){
  var tM=0,pM=0,aM=0,vM=0,tP=0;
  (o.materiais||[]).forEach(function(m){tM+=m.val||0;if(m.status==='pago')pM+=m.val||0;else if(m.status==='aberto')aM+=m.val||0;else vM+=m.val||0;});
  (o.pagamentos||[]).forEach(function(p){tP+=p.val||0;});
  return{tM:tM,pM:pM,aM:aM,vM:vM,tP:tP,total:tM+tP};
}

function calcPrest(pid){
  var tot=0,pago=0;
  DADOS.obras.forEach(function(o){(o.pagamentos||[]).forEach(function(p){if(p.prestId===pid){tot+=p.val||0;if(p.status==='pago')pago+=p.val||0;}});});
  return{tot:tot,pago:pago,aberto:tot-pago};
}

// ===== TABS =====
function setTab(n){
  TAB_ATUAL=n;
  document.querySelectorAll('.topo-btn').forEach(function(b,i){b.classList.toggle('ativo',i===n);});
  render();
}

// ===== RENDER =====
function render(){
  var c=document.getElementById('conteudo');
  if(TAB_ATUAL===0) c.innerHTML=renderObras();
  else if(TAB_ATUAL===1) c.innerHTML=renderPrestadores();
  else c.innerHTML=renderResumo();
}

function renderObras(){
  var h='';
  if(isAdmin()) h+='<button class="btn-novo" onclick="abrirNovaObra()">＋ Nova Obra</button>';
  else h+='<div class="badge-viewer">👁️ Modo visualizador — somente leitura</div>';

  DADOS.obras.forEach(function(obra,oi){
    var c=calcObra(obra);
    h+='<div class="card">';
    h+='<div class="card-topo" onclick="toggleObra('+oi+')">';
    h+='<div><div class="card-nome">'+obra.nome+'</div><div class="card-sub">👤 '+obra.cliente+(obra.end?' · '+obra.end:'')+'</div></div>';
    h+='<div><div class="card-val">R$ '+fmt(c.total)+'</div><div style="font-size:10px;color:#888;text-align:right">total</div></div>';
    h+='</div>';
    h+='<div id="ob-'+oi+'" class="card-body">';

    // Mini resumo
    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #eee">';
    h+='<div style="padding:9px;text-align:center;border-right:1px solid #eee"><div style="font-size:9px;color:#888;text-transform:uppercase;font-weight:700">Material</div><div style="font-size:13px;font-weight:700;color:#1e40af">R$ '+fmt(c.tM)+'</div></div>';
    h+='<div style="padding:9px;text-align:center;border-right:1px solid #eee"><div style="font-size:9px;color:#888;text-transform:uppercase;font-weight:700">Mão de Obra</div><div style="font-size:13px;font-weight:700;color:#7c3aed">R$ '+fmt(c.tP)+'</div></div>';
    h+='<div style="padding:9px;text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;font-weight:700">Total</div><div style="font-size:13px;font-weight:700;color:#15803d">R$ '+fmt(c.total)+'</div></div>';
    h+='</div>';

    // Status material
    h+='<div style="display:flex;gap:5px;flex-wrap:wrap;padding:7px 11px;border-bottom:1px solid #eee">';
    if(c.pM>0)h+='<span class="tag pago">✅ Pago R$ '+fmt(c.pM)+'</span>';
    if(c.aM>0)h+='<span class="tag aberto">🔴 Aberto R$ '+fmt(c.aM)+'</span>';
    if(c.vM>0)h+='<span class="tag vencer">🟡 A vencer R$ '+fmt(c.vM)+'</span>';
    h+='</div>';

    // Progresso
    if(obra.orc>0){
      var pct=Math.min(100,Math.round((c.total/obra.orc)*100));
      h+='<div style="padding:7px 11px;border-bottom:1px solid #eee">';
      h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:3px"><span>Orçamento: R$ '+fmt(obra.orc)+'</span><span>'+pct+'%</span></div>';
      h+='<div style="background:#eee;border-radius:4px;height:6px"><div style="width:'+pct+'%;height:100%;background:'+(pct>90?'#b91c1c':pct>70?'#d97706':'#15803d')+';border-radius:4px"></div></div>';
      h+='</div>';
    }

    // Materiais
    h+='<div class="sec"><span>📦 Material ('+( obra.materiais||[]).length+')</span>'+(isAdmin()?'<button onclick="abrirMat('+oi+')">＋ Lançar</button>':'')+'</div>';
    if(!(obra.materiais||[]).length){h+='<div class="vazio">Nenhuma compra lançada</div>';}
    else{
      (obra.materiais||[]).forEach(function(m,mi){
        h+='<div class="linha">';

        h+='<div style="text-align:right"><div class="linha-val">R$ '+fmt(m.val)+'</div><span class="tag '+m.status+'">'+(m.status==='pago'?'✅':m.status==='aberto'?'🔴':'🟡')+'</span></div>';
        if(isAdmin())h+='<div class="linha-acoes"><button class="btn-ed" onclick="editarMat('+oi+','+mi+')">✏️</button><button class="btn-del" onclick="delMat('+oi+','+mi+')">🗑️</button></div>';
        h+='</div>';
      });
      h+='<div class="total-linha"><span>Total material</span><span style="color:#1e40af">R$ '+fmt(c.tM)+'</span></div>';
    }

    // Pagamentos por prestador
    h+='<div class="sec"><span>👷 Mão de Obra</span>'+(isAdmin()?'<button onclick="abrirPag('+oi+',-1)" style="background:#7c3aed">＋ Lançar</button>':'')+'</div>';
    var grupos={};
    (obra.pagamentos||[]).forEach(function(p,pi){if(!grupos[p.prestId])grupos[p.prestId]=[];grupos[p.prestId].push({p:p,pi:pi});});
    if(!Object.keys(grupos).length){h+='<div class="vazio">Nenhum pagamento lançado</div>';}
    else{
      Object.keys(grupos).forEach(function(pid){
        var prest=DADOS.prestadores.find(function(pr){return pr.id===+pid;})||{nome:'Prestador #'+pid};
        var items=grupos[pid];
        var totP=items.reduce(function(s,x){return s+x.p.val;},0);
        h+='<div style="padding:6px 11px;background:#f3e8ff;border-top:1px solid #eee;display:flex;justify-content:space-between"><span style="font-size:11px;font-weight:700;color:#7c3aed">👷 '+prest.nome+'</span><span style="font-size:11px;font-weight:700;color:#7c3aed">R$ '+fmt(totP)+'</span></div>';
        items.forEach(function(x){
          var p=x.p,pi=x.pi;
          h+='<div class="linha">';
          h+='<div><div class="linha-desc">'+p.desc+'</div><div class="linha-info">📅 '+fmtD(p.data)+' · '+p.forma+'</div></div>';
          h+='<div style="text-align:right"><div class="linha-val">R$ '+fmt(p.val)+'</div><span class="tag '+p.status+'">'+(p.status==='pago'?'✅ Pago':'🔴 A pagar')+'</span></div>';
          if(isAdmin())h+='<div class="linha-acoes"><button class="btn-ed" onclick="editarPag('+oi+','+pi+')">✏️</button><button class="btn-del" onclick="delPag('+oi+','+pi+')">🗑️</button></div>';
          h+='</div>';
        });
      });
      h+='<div class="total-linha"><span>Total mão de obra</span><span style="color:#7c3aed">R$ '+fmt(c.tP)+'</span></div>';
    }

    // Botões obra
    if(isAdmin()){
      h+='<div style="display:flex;gap:8px;padding:9px 11px;border-top:1px solid #eee">';
      h+='<button class="btn-cancel" onclick="gerarPdf('+oi+')" style="flex:1">📄 PDF</button>';
      h+='<button class="btn-cancel" style="flex:1;color:#1e40af;border-color:#1e40af" onclick="editarObra('+oi+')">✏️ Editar</button>';
      h+='<button class="btn-cancel" style="flex:1;color:#b91c1c;border-color:#b91c1c" onclick="delObra('+oi+')">🗑️</button>';
      h+='</div>';
    }
    h+='</div></div>';
  });
  return h;
}

function renderPrestadores(){
  var h='';
  if(isAdmin())h+='<button class="btn-novo roxo" onclick="abrirNovoPrest()">＋ Cadastrar Prestador</button>';
  DADOS.prestadores.forEach(function(prest,pi){
    var c=calcPrest(prest.id);
    h+='<div class="card">';
    h+='<div class="card-topo" onclick="togglePrest('+pi+')" style="border-left-color:#7c3aed">';
    h+='<div><div class="card-nome">'+prest.nome+'</div><div class="card-sub">'+prest.tipo+(prest.tel?' · 📞 '+prest.tel:'')+'</div>';
    h+='<div style="display:flex;gap:4px;margin-top:5px">';
    if(c.pago>0)h+='<span class="tag pago">✅ R$ '+fmt(c.pago)+'</span>';
    if(c.aberto>0)h+='<span class="tag aberto">🔴 R$ '+fmt(c.aberto)+'</span>';
    h+='</div></div>';
    h+='<div style="min-width:100px;text-align:right"><div style="font-size:15px;font-weight:800;color:#7c3aed">R$ '+fmt(c.tot)+'</div><div style="font-size:10px;color:#888">total geral</div></div>';
    h+='</div>';
    h+='<div id="pr-'+pi+'" class="card-body">';

    // Histórico de pagamentos por obra
    var todosPags=[];
    DADOS.obras.forEach(function(obra,oi){(obra.pagamentos||[]).forEach(function(p,pi2){if(p.prestId===prest.id)todosPags.push({p:p,obraNome:obra.nome,oi:oi,pi:pi2});});});

    if(!todosPags.length){h+='<div class="vazio">Nenhum pagamento registrado</div>';}
    else{
      // Agrupar por obra
      var porObra={};
      todosPags.forEach(function(x){if(!porObra[x.obraNome])porObra[x.obraNome]=[];porObra[x.obraNome].push(x);});

        // Cabeçalho tabela
        h+='<div style="display:grid;grid-template-columns:85px 1fr 80px auto;font-size:10px;font-weight:700;color:#888;background:#fafafa;padding:4px 11px;border-bottom:1px solid #eee"><span>DATA</span><span>DESCRIÇÃO</span><span>FORMA</span><span style="text-align:right">VALOR</span></div>';
        items.forEach(function(x,xi){
          h+='<div style="display:grid;grid-template-columns:85px 1fr 80px auto;padding:7px 11px;border-bottom:1px solid #eee;background:'+(xi%2===0?'#fff':'#fafafa')+';align-items:center;font-size:11px">';
          h+='<span style="color:#888">'+fmtD(x.p.data)+'</span>';
          h+='<div><div style="font-weight:600">'+x.p.desc+'</div><span class="tag '+x.p.status+'">'+(x.p.status==='pago'?'✅ Pago':'🔴 A pagar')+'</span></div>';
          h+='<span style="color:#888">'+x.p.forma+'</span>';
          h+='<div style="text-align:right"><span style="font-weight:700">R$ '+fmt(x.p.val)+'</span>'+(isAdmin()?'<button class="btn-del" style="margin-left:4px" onclick="delPag('+x.oi+','+x.pi+')">🗑️</button>':'')+'</div>';
          h+='</div>';
        });
      });
      h+='<div class="total-linha" style="border-top:2px solid #7c3aed"><span style="color:#7c3aed;font-weight:800">TOTAL '+prest.nome.toUpperCase()+'</span><span style="color:#7c3aed;font-weight:800">R$ '+fmt(c.tot)+'</span></div>';
    }

    if(isAdmin()){
      h+='<div style="display:flex;gap:8px;padding:9px 11px;border-top:1px solid #eee">';
      h+='<button class="btn-cancel" style="flex:1;color:#7c3aed;border-color:#7c3aed" onclick="abrirPagPrest('+pi+')">＋ Pagamento</button>';
      h+='<button class="btn-cancel" style="flex:1;color:#b91c1c;border-color:#b91c1c" onclick="delPrest('+pi+')">🗑️ Excluir</button>';
      h+='</div>';
    }
    h+='</div></div>';
  });
  return h;
}

function renderResumo(){
  var tM=0,tP=0,tA=0,tV=0,tot=0;
  DADOS.obras.forEach(function(o){var c=calcObra(o);tM+=c.tM;tP+=c.tP;tA+=c.aM;tV+=c.vM;tot+=c.total;});
  var h='<div class="res-grid">';
  h+='<div class="res-card" style="grid-column:1/-1"><div class="res-lbl">💰 Total Geral</div><div class="res-val verde">R$ '+fmt(tot)+'</div></div>';
  h+='<div class="res-card"><div class="res-lbl">📦 Material</div><div class="res-val azul">R$ '+fmt(tM)+'</div></div>';
  h+='<div class="res-card"><div class="res-lbl">👷 Mão de Obra</div><div class="res-val" style="color:#7c3aed">R$ '+fmt(tP)+'</div></div>';
  h+='<div class="res-card"><div class="res-lbl">🔴 Em Aberto</div><div class="res-val verm">R$ '+fmt(tA)+'</div></div>';
  h+='<div class="res-card"><div class="res-lbl">🟡 A Vencer</div><div class="res-val amar">R$ '+fmt(tV)+'</div></div>';
  h+='</div>';
  h+='<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Por Prestador</div>';
  DADOS.prestadores.forEach(function(pr){
    var c=calcPrest(pr.id);
    if(!c.tot)return;
    h+='<div class="res-card" style="margin-bottom:8px;border-left:4px solid #7c3aed;display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div style="font-size:12px;font-weight:700">'+pr.nome+'</div><div style="font-size:10px;color:#888">'+pr.tipo+'</div>';
    if(c.pago>0)h+='<span class="tag pago" style="margin-top:3px">✅ R$ '+fmt(c.pago)+'</span> ';
    if(c.aberto>0)h+='<span class="tag aberto">🔴 R$ '+fmt(c.aberto)+'</span>';
    h+='</div><div style="font-size:16px;font-weight:800;color:#7c3aed">R$ '+fmt(c.tot)+'</div></div>';
  });
  return h;
}

// ===== CRUD OBRAS =====
function abrirNovaObra(){['o-nome','o-cliente','o-end','o-orc'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('modal-obra').classList.add('aberto');}

function editarObra(oi){
  var o=DADOS.obras[oi];CTX.obraIdx=oi;
  document.getElementById('o-nome').value=o.nome;document.getElementById('o-cliente').value=o.cliente;document.getElementById('o-end').value=o.end||'';document.getElementById('o-orc').value=o.orc||'';

// ===== CRUD MATERIAL =====
function abrirMat(oi){CTX.obraIdx=oi;CTX.matIdx=-1;['m-desc','m-forn','m-val','m-venc'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('m-data').value=hoje();document.getElementById('modal-mat').classList.add('aberto');}
function editarMat(oi,mi){
  var m=DADOS.obras[oi].materiais[mi];CTX.obraIdx=oi;CTX.matIdx=mi;
  document.getElementById('m-data').value=m.data||'';document.getElementById('m-desc').value=m.desc;document.getElementById('m-forn').value=m.forn;document.getElementById('m-val').value=m.val;document.getElementById('m-status').value=m.status;document.getElementById('m-venc').value=m.venc||'';document.getElementById('m-forma').value=m.forma||'PIX';

function salvarMat(){
  var desc=document.getElementById('m-desc').value.trim();var val=parseFloat(document.getElementById('m-val').value)||0;

  salvar();fechar('modal-mat');
  var sc=window.scrollY;render();var el=document.getElementById('ob-'+oi);if(el)el.style.display='block';window.scrollTo(0,sc);

}
function delMat(oi,mi){if(!confirm('Remover este material?'))return;DADOS.obras[oi].materiais.splice(mi,1);var sc=window.scrollY;salvar();render();var el=document.getElementById('ob-'+oi);if(el)el.style.display='block';window.scrollTo(0,sc);toast('Removido');}

// ===== CRUD PAGAMENTOS =====
function abrirPag(oi,prestId){
  CTX.obraIdx=oi;CTX.pagIdx=-1;CTX.prestId=prestId;
  ['pag-desc','pag-val'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('pag-data').value=hoje();
  // Preencher select de obras
  var sel=document.getElementById('pag-obra-sel');sel.innerHTML='';
  DADOS.obras.forEach(function(o){var opt=document.createElement('option');opt.value=o.id;opt.textContent=o.nome;sel.appendChild(opt);});
  if(oi>=0&&DADOS.obras[oi])sel.value=DADOS.obras[oi].id;
  // Info prestador
  var prest=DADOS.prestadores.find(function(p){return p.id===prestId;})||null;
  document.getElementById('pag-info').textContent=prest?'👷 '+prest.nome:'👷 Selecione o prestador';
  // Select prestador se não definido
  if(!prest){
    var selPr='<select id="pag-prest-sel" style="width:100%;padding:9px;border:1.5px solid #ddd;border-radius:7px;font-size:13px;background:#f8f8f8;margin-bottom:11px">';
    DADOS.prestadores.forEach(function(p){selPr+='<option value="'+p.id+'">'+p.nome+'</option>';});
    selPr+='</select>';
    document.getElementById('pag-info').innerHTML='Prestador:<br>'+selPr;

  document.getElementById('modal-pag').classList.add('aberto');
}
function abrirPagPrest(pi){

}
function editarPag(oi,pi){
  var p=DADOS.obras[oi].pagamentos[pi];CTX.obraIdx=oi;CTX.pagIdx=pi;CTX.prestId=p.prestId;
  var prest=DADOS.prestadores.find(function(pr){return pr.id===p.prestId;})||{nome:'Prestador'};

  var sel=document.getElementById('pag-obra-sel');sel.innerHTML='';DADOS.obras.forEach(function(o){var opt=document.createElement('option');opt.value=o.id;opt.textContent=o.nome;sel.appendChild(opt);});sel.value=DADOS.obras[oi].id;
  document.getElementById('modal-pag').classList.add('aberto');

function salvarPag(){
  var val=parseFloat(document.getElementById('pag-val').value)||0;if(!val){toast('Informe o valor');return;}
  var selPr=document.getElementById('pag-prest-sel');
  var prestId=selPr?parseInt(selPr.value):CTX.prestId;

  if(CTX.pagIdx>=0)DADOS.obras[CTX.obraIdx].pagamentos[CTX.pagIdx]=Object.assign(DADOS.obras[CTX.obraIdx].pagamentos[CTX.pagIdx],pag);
  else DADOS.obras[oi].pagamentos.push(pag);
  salvar();fechar('modal-pag');render();toast('✅ Pagamento salvo!');

function delPag(oi,pi){if(!confirm('Remover pagamento?'))return;var sc=window.scrollY;DADOS.obras[oi].pagamentos.splice(pi,1);salvar();render();window.scrollTo(0,sc);toast('Removido');}

// ===== PDF =====
function gerarPdf(oi){
  var o=DADOS.obras[oi];var c=calcObra(o);
  var d=new Date();var dh=d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
  var mRows=(o.materiais||[]).map(function(m,i){return'<tr><td>'+(i+1)+'</td><td>'+fmtD(m.data)+'</td><td>'+m.desc+'</td><td>'+m.forn+'</td><td>'+m.forma+'</td><td style="color:'+(m.status==='pago'?'#15803d':m.status==='aberto'?'#b91c1c':'#d97706')+'">'+(m.status==='pago'?'Pago':m.status==='aberto'?'Aberto':'A vencer')+'</td><td style="text-align:right;font-weight:700">R$ '+fmt(m.val)+'</td></tr>';}).join('');
